<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmed Khedr Elsheshtawy | Blog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&family=Work+Sans:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="./blog-index.css">
    <link rel="icon" type="image/png" href="../img/github_pfp_rounded.png"> 
    <script src="./blog-index.js" defer></script>
</head>
<body>
    <header class="blog-page-header">
        <div class="blog-header-content">
            <p class="blog-eyebrow">Ahmed Elsheshtawy</p>
            <h1>Blog</h1>
            <p class="blog-subtitle">Insights on technology, entrepreneurship, and learning through building.</p>
        </div>
        <a href="../index.html#blog" class="back-link">
            <i class="fas fa-arrow-left"></i>
            Back to Main Website
        </a>
    </header>

    <main class="blog-layout" aria-label="Blog page layout">
        <aside class="blog-slider" aria-label="Blog post selector">
            <h2 class="slider-heading">All Posts</h2>

            <!--
                NEW BLOG MOLD (STEP 1: add a slider button)

                <button
                    type="button"
                    class="blog-slide"
                    data-post-id="your-unique-id"
                    data-post-title="Your Blog Title"
                    data-post-date="DD Month, YYYY"
                    aria-pressed="false">
                    <span class="slide-title">Your Blog Title</span>
                    <span class="slide-date"><i class="fas fa-calendar"></i> DD Month, YYYY</span>
                    <span class="slide-summary">Short summary shown in the left slider.</span>
                </button>
            -->

                <button
                    type="button"
                    class="blog-slide"
                    data-post-id="fortress-in-gulf"
                    data-post-title="Fortress in the Gulf: How Qatar Stood Firm When the Missiles Flew"
                    data-post-date="29 Mar, 2026"
                    aria-pressed="false">
                    <span class="slide-title">Fortress in the Gulf: How Qatar Stood Firm When the Missiles Flew</span>
                    <span class="slide-date"><i class="fas fa-calendar"></i> 29 Mar, 2026</span>
                    <span class="slide-summary">How Qatar's multi-layered defense strategy—military, diplomatic, and alliance-based—held firm during regional conflict.</span>
                </button>
        </aside>

        <section class="blog-reader" aria-live="polite">
            <header class="reader-header">
                <p class="reader-label">Now Reading</p>
                <h2 id="reader-title">Select a blog post</h2>
                <p id="reader-date"><i class="fa-solid fa-calendar"></i> Date will appear here</p>
                <p id="reader-author"><i class="fa-solid fa-user"></i> Ahmed Elsheshtawy</p>
            </header>

            <!--
                NEW BLOG MOLD (STEP 2: add matching blog content panel)
                IMPORTANT: data-post-id must exactly match the button data-post-id.

                <article class="blog-post-panel" data-post-id="your-unique-id">
                    <h3 class="post-title">Your Blog Title</h3>
                    <p class="post-subtitle">One-line subtitle for your post.</p>

                    
                    <section class="post-section">
                        <h4>Introduction</h4>
                        <p>Your introduction paragraph.</p>
                    </section>
                    
                    <section class="post-section">
                        <h4>Main Section</h4>
                        <p>Your main content paragraph.</p>
                    </section>
                    
                    <section class="post-section">
                        <h4>Conclusion</h4>
                        <p>Your conclusion paragraph.</p>
                    </section>
                    
                    *** Optional: Featured image with caption ***
                    <figure class="post-image-block">
                        <img src="path/to/your/image.jpg" alt="Descriptive alt text" class="post-image">
                        <figcaption class="post-image-caption">Optional: Image description or caption text here</figcaption>
                    </figure>
                    *** ***
                </article>
            -->

            <article class="blog-post-panel" data-post-id="fortress-in-gulf">
                <section class="post-section">
                    <p>A blog post is coming soon. Stay tuned!</p>
                </section>
            </article>
        </section>
    </main>
</body>
</html>
